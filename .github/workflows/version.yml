name: Update Version Badge

on:
  push:
    branches:
      - master

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get commit count
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "version=0.02.$(printf '%04d' $COUNT)" >> $GITHUB_OUTPUT

      - name: Update README badge
        run: |
          sed -i "s/versión-[0-9]*\.[0-9]*\.[0-9]*/versión-${{ steps.version.outputs.version }}/g" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update version badge to ${{ steps.version.outputs.version }}"
          git push
